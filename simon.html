<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says 🎮 | Ultimate Edition</title>
    <!-- Google Fonts for beautiful typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="simon.css">
</head>
<body>
    <!-- Vibrant background glowing spheres -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="game-container" id="game-container">
        <header>
            <h1>Simon Says 🎮</h1>
            <p class="tagline">Repeat the pattern shown by Simon. Score points as you advance!</p>
        </header>

        <!-- Scoreboard showing level and high score -->
        <div class="scoreboard">
            <div class="score-card">
                <span class="score-label">LEVEL</span>
                <span class="score-val" id="level-val">0</span>
            </div>
            <div class="score-card highlight">
                <span class="score-label">HIGH SCORE</span>
                <span class="score-val" id="high-score-val">0</span>
            </div>
        </div>

        <!-- Dynamic Game Status Text -->
        <h2 id="status-text">Press <span class="accent">Enter</span> or click Start to Play</h2>

        <!-- Interactive Simon Buttons -->
        <div class="btn-container">
            <button class="btn yellow" id="yellow" aria-label="Yellow pad"></button>
            <button class="btn red" id="red" aria-label="Red pad"></button>
            <button class="btn purple" id="purple" aria-label="Purple pad"></button>
            <button class="btn green" id="green" aria-label="Green pad"></button>
        </div>

        <!-- Controls for Game start and sound customization -->
        <div class="control-panel">
            <button id="start-btn" class="action-btn start">Start Game</button>
            <button id="sound-btn" class="action-btn sound-toggle">
                <span id="sound-icon">🔊</span> <span id="sound-text">Sound On</span>
            </button>
        </div>
    </div>

    <script src="simon.js"></script>
</body>
</html>
